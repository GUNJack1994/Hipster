<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Arkuszy A4 - Premium Music Cards</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        /* --- STYLE INTERFEJSU UŻYTKOWNIKA --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 25px;
            font-weight: 300;
            color: #e0a96d;
            letter-spacing: 1px;
        }

        .dashboard {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            margin-bottom: 30px;
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #334155;
        }

        .row {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .flex-grow {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .dashboard input[type="text"] {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: #fff;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .dashboard input[type="text"].input-error {
            border-color: #ef4444 !important;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .dashboard button {
            flex: 1;
            padding: 14px;
            border-radius: 6px;
            border: none;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        #add-btn {
            background-color: #e0a96d;
            color: #0b132b;
        }

        #add-btn:hover {
            background-color: #cca173;
        }

        #add-btn.edit-mode {
            background-color: #10b981;
            color: #fff;
        }

        #add-btn.edit-mode:hover {
            background-color: #059669;
        }

        #cancel-edit-btn {
            background-color: #64748b;
            color: #fff;
            display: none;
        }

        #cancel-edit-btn:hover {
            background-color: #475569;
        }

        #download-sheets-btn {
            background-color: #38bdf8;
            color: #0f172a;
        }

        #download-sheets-btn:hover {
            background-color: #0ea5e9;
        }

        .csv-actions-row {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 5px;
        }

        .btn-csv {
            background-color: #475569;
            color: #fff;
            font-size: 13px !important;
            padding: 10px !important;
        }

        .btn-csv:hover {
            background-color: #334155;
        }

        #csv-file-input {
            display: none;
        }

        .queue-section {
            width: 100%;
            max-width: 650px;
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        .queue-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .queue-header-row h3 {
            margin: 0;
            color: #e2e8f0;
        }

        #test-qr-btn {
            background-color: #e2e8f0;
            color: #0f172a;
            font-size: 12px;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        #test-qr-btn:hover {
            background-color: #cbd5e1;
        }

        .queue-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
        }

        .queue-item {
            background: #0f172a;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            border: 1px solid #1e293b;
        }

        .item-info-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .qr-status-badge {
            font-size: 11px;
            font-weight: bold;
            margin-top: 2px;
        }

        .status-none {
            color: #94a3b8;
        }

        .status-ok {
            color: #4444ff;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 2px 6px;
            border-radius: 3px;
            display: inline-block;
        }

        .status-fail {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            display: inline-block;
        }

        .item-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .edit-item-btn {
            background: #f59e0b;
            color: #0f172a;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .edit-item-btn:hover {
            background: #d97706;
        }

        .remove-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .remove-btn:hover {
            background: #dc2626;
        }

        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        /* --- BUDOWA PARY KARTY (NOWY DESIGN) --- */
        .card-pair-print {
            display: flex;
            width: 120mm;
            height: 90mm;
            border: 1px solid #1e2541;
            box-sizing: border-box;
            background: #0b132b;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
        }

        .card-print {
            width: 60mm;
            height: 90mm;
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* AWERS DRUK - CAŁKOWITY ODWRÓT OD HITSTERA */
        .print-front {
            padding: 8mm 5mm;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            background: #0b132b;
            background: radial-gradient(circle at 50% 20%, #1c2541 0%, #0b132b 80%);
        }

        /* Złote ramki wewnętrzne */
        .print-front::before,
        .print-back::before {
            content: "";
            position: absolute;
            top: 3mm;
            left: 3mm;
            right: 3mm;
            bottom: 3mm;
            border: 1px solid rgba(224, 169, 109, 0.25);
            border-radius: 6px;
            pointer-events: none;
            z-index: 1;
        }

        .front-header {
            font-size: 8pt;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #e0a96d;
            margin-bottom: 8mm;
            font-weight: 600;
            font-family: Arial, sans-serif;
            z-index: 5;
        }

        .editable-text {
            width: 100%;
            outline: none;
            font-family: 'Segoe UI', Arial, sans-serif;
            z-index: 20;
            word-wrap: break-word;
        }

        .preview-section .editable-text {
            border: 1px dashed transparent;
        }

        .preview-section .editable-text:hover,
        .preview-section .editable-text:focus {
            border: 1px dashed rgba(224, 169, 109, 0.5);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .artist {
            font-size: 13pt;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 2mm;
            letter-spacing: -0.3px;
        }

        .title {
            font-size: 10pt;
            font-style: italic;
            color: #9ab0c7;
            line-height: 1.3;
            padding: 0 2mm;
            margin-bottom: 6mm;
        }

        /* Złoty element geometryczny zamiast płyty winylowej */
        .front-divider {
            width: 25mm;
            height: 1px;
            background: linear-gradient(to right, transparent, #e0a96d, transparent);
            margin-bottom: 8mm;
            z-index: 5;
        }

        .year {
            font-weight: 800;
            color: #e0a96d;
            letter-spacing: 1px;
            display: inline-block;
            padding: 2mm 5mm;
            border-top: 1px solid rgba(224, 169, 109, 0.2);
            border-bottom: 1px solid rgba(224, 169, 109, 0.2);
        }

        /* REWERS DRUK */
        .print-back {
            border-left: 1px dashed rgba(224, 169, 109, 0.3);
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8mm 5mm;
        }

        .back-title {
            font-size: 8pt;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
            margin-bottom: 6mm;
            font-family: Arial, sans-serif;
            z-index: 5;
        }

        .qr-wrapper {
            position: relative;
            z-index: 10;
            background: white;
            padding: 3mm;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            border: 2px solid #e0a96d;
            /* Złota otoczka */
        }

        .qr-wrapper canvas,
        .qr-wrapper img {
            width: 26mm !important;
            height: 26mm !important;
        }

        /* --- ARKUSZ A4 DO EKSPORTU --- */
        .a4-sheet {
            width: 297mm;
            height: 210mm;
            background-color: #ffffff;
            position: absolute;
            left: -9999mm;
            top: -9999mm;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .a4-sheet * {
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <h1>Generator Arkuszy A4 - Premium Music Cards</h1>

    <div class="dashboard">
        <div class="row">
            <div class="flex-grow">
                <label for="url-input">Wklej link z YouTube dla kodu QR:</label>
                <input type="text" id="url-input" placeholder="Wklej adres URL filmu z YouTube..." value="">
            </div>
        </div>
        <div class="btn-group">
            <div class="btn-row">
                <button id="add-btn">➕ Dodaj kartę do listy</button>
                <button id="cancel-edit-btn">Anuluj edycję</button>
            </div>
            <button id="download-sheets-btn">💾 Pobierz arkusze A4 (PDF)</button>

            <div class="csv-actions-row">
                <button id="export-csv-btn" class="btn-csv">📤 Eksportuj listę do CSV</button>
                <button id="import-csv-trigger" class="btn-csv">📥 Importuj listę z CSV</button>
                <input type="file" id="csv-file-input" accept=".csv">
            </div>
        </div>
    </div>

    <div id="qr-hidden-generator" style="display:none;"></div>

    <div class="queue-section">
        <div class="queue-header-row">
            <h3>Lista kart w kolejce do druku (<span id="queue-count">0</span>)</h3>
            <button id="test-qr-btn" title="Automatyczny test odczytu kodów QR oraz dostępności filmów">🔍 Przetestuj
                poprawność kodów QR</button>
        </div>
        <div class="queue-list" id="queue-container"></div>
    </div>

    <div id="report-section"
        style="display: none; width: 100%; max-width: 650px; background: #2a1f2d; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ff1744;">
        <div
            style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ff1744; padding-bottom: 8px; margin-bottom: 10px;">
            <h3 style="margin: 0; color: #ff1744;">📋 Raport z walidacji (Znaleziono błędy)</h3>
            <button id="download-report-btn"
                style="background-color: #ff1744; color: #fff; font-size: 12px; padding: 6px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">💾
                Pobierz plik .TXT</button>
        </div>
        <div id="report-table-container"></div>
    </div>

    <div class="preview-section">
        <span style="color: #94a3b8;">👇 Edytuj dane bezpośrednio na karcie poniżej przed dodaniem jej do listy:</span>
        <div class="cards-container">
            <div class="card-pair-print" id="live-preview-pair">
                <div class="card-print print-front" id="awers-card">
                    <div class="front-header">Quiz Muzyczny</div>
                    <div class="editable-text artist" id="txt-artist" contenteditable="true">&lt;Nazwa wykonawcy&gt;
                    </div>
                    <div class="editable-text title" id="txt-title" contenteditable="true">&lt;Tytuł utworu&gt;</div>
                    <div class="front-divider"></div>
                    <div class="editable-text year" id="txt-year" contenteditable="true" style="font-size: 18pt;">
                        &lt;Rok wydania&gt;</div>
                </div>

                <div class="card-print print-back">
                    <div class="back-title">Zeskanuj utwór</div>
                    <div class="qr-wrapper">
                        <div id="qrcode"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="sheet-generator-factory"></div>

    <script>
        const qrContainer = document.getElementById("qrcode");
        const urlInput = document.getElementById("url-input");
        const awersCard = document.getElementById("awers-card");

        const artistInput = document.getElementById("txt-artist");
        const yearInput = document.getElementById("txt-year");
        const titleInput = document.getElementById("txt-title");

        const queueContainer = document.getElementById("queue-container");
        const queueCountElement = document.getElementById("queue-count");
        const factory = document.getElementById("sheet-generator-factory");

        const addBtn = document.getElementById("add-btn");
        const cancelEditBtn = document.getElementById("cancel-edit-btn");
        const testQrBtn = document.getElementById("test-qr-btn");

        let savedCardsCollection = [];
        let currentlyEditedCardId = null;

        const defaultYoutubeUrl = "https://www.youtube.com";

        const qrcode = new QRCode(qrContainer, {
            text: defaultYoutubeUrl,
            width: 150,
            height: 150,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        urlInput.addEventListener("input", function () {
            if (urlInput.value.trim() !== "") {
                urlInput.classList.remove("input-error");
            }
            qrcode.clear();
            let targetUrl = urlInput.value.trim();
            if (targetUrl === "") targetUrl = defaultYoutubeUrl;
            qrcode.makeCode(targetUrl);
        });

        yearInput.addEventListener("input", function () {
            const txt = yearInput.innerText.trim();
            yearInput.style.fontSize = /^\d+$/.test(txt) ? "22pt" : "18pt";
        });

        function resetCardToPlaceholders() {
            artistInput.innerHTML = "&lt;Nazwa wykonawcy&gt;";
            yearInput.innerHTML = "&lt;Rok wydania&gt;";
            yearInput.style.fontSize = "18pt";
            titleInput.innerHTML = "&lt;Tytuł utworu&gt;";
            urlInput.value = "";
            urlInput.classList.remove("input-error");
            qrcode.makeCode(defaultYoutubeUrl);

            currentlyEditedCardId = null;
            addBtn.innerText = "➕ Dodaj kartę do listy";
            addBtn.classList.remove("edit-mode");
            cancelEditBtn.style.display = "none";
        }

        addBtn.addEventListener("click", function () {
            const currentRawUrl = urlInput.value.trim();

            if (currentRawUrl === "") {
                urlInput.classList.add("input-error");
                urlInput.focus();
                alert("Błąd: Pole z linkiem YouTube nie może być puste przed dodaniem lub zapisaniem karty!");
                return;
            }

            const artist = artistInput.innerText.trim();
            const year = yearInput.innerText.trim();
            const title = titleInput.innerText.trim();
            const currentQrSource = qrContainer.querySelector("canvas").toDataURL("image/png");
            const currentBg = awersCard.style.background;
            const currentBgColor = awersCard.style.backgroundColor;

            if (currentlyEditedCardId !== null) {
                const cardIndex = savedCardsCollection.findIndex(c => c.id === currentlyEditedCardId);
                if (cardIndex !== -1) {
                    savedCardsCollection[cardIndex].artist = artist;
                    savedCardsCollection[cardIndex].year = year;
                    savedCardsCollection[cardIndex].title = title;
                    savedCardsCollection[cardIndex].qrDataUrl = currentQrSource;
                    savedCardsCollection[cardIndex].backgroundStyle = currentBg;
                    savedCardsCollection[cardIndex].backgroundColor = currentBgColor;
                    savedCardsCollection[cardIndex].rawUrl = currentRawUrl;
                    savedCardsCollection[cardIndex].yearFontSize = yearInput.style.fontSize;
                    savedCardsCollection[cardIndex].validationStatus = "none";
                }
            } else {
                const cardData = {
                    id: Date.now(),
                    artist: artist,
                    year: year,
                    title: title,
                    qrDataUrl: currentQrSource,
                    backgroundStyle: currentBg,
                    backgroundColor: currentBgColor,
                    rawUrl: currentRawUrl,
                    yearFontSize: yearInput.style.fontSize,
                    validationStatus: "none"
                };
                savedCardsCollection.push(cardData);
            }

            updateQueueUI();
            resetCardToPlaceholders();
        });

        cancelEditBtn.addEventListener("click", function () {
            resetCardToPlaceholders();
        });

        function updateQueueUI() {
            queueContainer.innerHTML = "";
            queueCountElement.innerText = savedCardsCollection.length;

            savedCardsCollection.forEach((card, index) => {
                const item = document.createElement("div");
                item.className = "queue-item";

                let statusBadge = `<span class="qr-status-badge status-none">Niesprawdzony</span>`;
                if (card.validationStatus === "ok") {
                    statusBadge = `<span class="qr-status-badge status-ok">✅ QR OK</span>`;
                } else if (card.validationStatus === "fail") {
                    statusBadge = `<span class="qr-status-badge status-fail">❌ BŁĄD QR / YT</span>`;
                }

                item.innerHTML = `
                    <div class="item-info-block">
                        <span><strong>#${index + 1}</strong> ${card.artist} - ${card.title} (${card.year})</span>
                        ${statusBadge}
                    </div>
                    <div class="item-actions">
                        <button class="edit-item-btn" onclick="startEditingCard(${card.id})">✏️ Edytuj</button>
                        <button class="remove-btn" onclick="removeCardFromQueue(${card.id})">Usuń</button>
                    </div>
                `;
                queueContainer.appendChild(item);
            });
        }

        window.startEditingCard = function (id) {
            const cardToEdit = savedCardsCollection.find(c => c.id === id);
            if (!cardToEdit) return;

            currentlyEditedCardId = id;
            artistInput.innerText = cardToEdit.artist;
            yearInput.innerText = cardToEdit.year;
            yearInput.style.fontSize = cardToEdit.yearFontSize;
            titleInput.innerText = cardToEdit.title;
            urlInput.value = cardToEdit.rawUrl;

            urlInput.classList.remove("input-error");

            qrcode.clear();
            let targetUrl = cardToEdit.rawUrl || defaultYoutubeUrl;
            qrcode.makeCode(targetUrl);

            addBtn.innerText = "💾 Zapisz zmiany w karcie";
            addBtn.classList.add("edit-mode");
            cancelEditBtn.style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.removeCardFromQueue = function (id) {
            if (currentlyEditedCardId === id) {
                resetCardToPlaceholders();
            }
            savedCardsCollection = savedCardsCollection.filter(c => c.id !== id);
            updateQueueUI();
        };

        /* --- TEST QR KODÓW + WALIDACJA DOSTĘPNOŚCI FILMÓW YT Z RAPORTEM --- */
        testQrBtn.addEventListener("click", async function () {
            if (savedCardsCollection.length === 0) {
                alert("Kolejka jest pusta, dodaj karty do przetestowania!");
                return;
            }

            const originalBtnText = testQrBtn.innerText;
            testQrBtn.innerText = "⏳ Testowanie w toku...";
            testQrBtn.disabled = true;

            const reportSection = document.getElementById("report-section");
            const reportContainer = document.getElementById("report-table-container");
            reportSection.style.display = "none";
            reportContainer.innerHTML = "";

            let passedTests = 0;
            let failedTests = 0;
            let failedCardsLogs = [];

            for (let card of savedCardsCollection) {
                let isUrlAlive = false;
                let failureReason = "";

                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                const match = card.rawUrl.match(regExp);
                const videoId = (match && match[2].length === 11) ? match[2] : null;

                if (videoId) {
                    try {
                        const response = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
                        if (response.ok) {
                            isUrlAlive = true;
                        } else {
                            failureReason = `Błąd YT (Status ${response.status}) - Film usunięty lub prywatny`;
                        }
                    } catch (error) {
                        failureReason = "Błąd połączenia / polityki CORS podczas sprawdzania linku";
                        isUrlAlive = false;
                    }
                } else {
                    if (card.rawUrl.includes("youtube.com/results")) {
                        isUrlAlive = true;
                    } else {
                        failureReason = "Nieprawidłowa struktura adresu URL YouTube (brak ID filmu)";
                    }
                }

                const isQrReadable = await new Promise((resolve) => {
                    const img = new Image();
                    img.src = card.qrDataUrl;

                    img.onload = function () {
                        const tempCanvas = document.createElement("canvas");
                        const ctx = tempCanvas.getContext("2d");
                        tempCanvas.width = 150;
                        tempCanvas.height = 150;

                        ctx.drawImage(img, 0, 0, 150, 150);
                        const imageData = ctx.getImageData(0, 0, 150, 150);

                        const decodedCode = jsQR(imageData.data, imageData.width, imageData.height, {
                            inversionAttempts: "dontInvert",
                        });

                        resolve(decodedCode && decodedCode.data === card.rawUrl);
                    };

                    img.onerror = () => resolve(false);
                });

                if (!isQrReadable && isUrlAlive) {
                    failureReason = "Kod QR wygenerował się niepoprawnie lub proces renderowania Canvas został przerwany";
                } else if (!isQrReadable && !isUrlAlive && failureReason === "") {
                    failureReason = "Zarówno link YT jest uszkodzony, jak i kod QR jest nieczytelny";
                }

                if (isQrReadable && isUrlAlive) {
                    card.validationStatus = "ok";
                    passedTests++;
                } else {
                    card.validationStatus = "fail";
                    failedTests++;

                    failedCardsLogs.push({
                        artist: card.artist,
                        title: card.title,
                        year: card.year,
                        url: card.rawUrl,
                        reason: failureReason
                    });
                }
            }

            updateQueueUI();

            testQrBtn.innerText = originalBtnText;
            testQrBtn.disabled = false;

            if (failedTests === 0) {
                alert(`✅ Sukces! Przetestowano ${passedTests} kodów. Wszystkie QR są czytelne, a filmy są DOSTĘPNE na YouTube!`);
            } else {
                let tableHtml = `
                    <table style="width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; color: #fff; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 2px solid #ff1744; color: #ff8a80;">
                                <th style="padding: 6px;">Utwór (Wykonawca - Tytuł)</th>
                                <th style="padding: 6px;">Błędny URL</th>
                                <th style="padding: 6px;">Powód błędu</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                failedCardsLogs.forEach(log => {
                    tableHtml += `
                        <tr style="border-bottom: 1px solid #443344;">
                            <td style="padding: 8px 6px;"><strong>${log.artist}</strong> - ${log.title} (${log.year})</td>
                            <td style="padding: 8px 6px; color: #ff8a80; word-break: break-all;"><code>${log.url}</code></td>
                            <td style="padding: 8px 6px; color: #ff1744; font-style: italic;">${log.reason}</td>
                        </tr>
                    `;
                });

                tableHtml += `</tbody></table>`;
                reportContainer.innerHTML = tableHtml;
                reportSection.style.display = "block";

                window.currentFailedLogsTxt = failedCardsLogs.map((l, i) =>
                    `[BŁĄD #${i + 1}]\nUtwór: ${l.artist} - ${l.title} (${l.year})\nLink: ${l.url}\nPowód: ${l.reason}\n----------------------------------------`
                ).join("\n");

                alert(`⚠️ Znaleziono problemy w ${failedTests} kartach! Raport wygenerowano poniżej.`);
            }
        });

        /* --- OBSŁUGA POBIERANIA RAPORTU TXT --- */
        document.getElementById("download-report-btn").addEventListener("click", function () {
            if (!window.currentFailedLogsTxt) return;

            const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
            const header = `RAPORT Z WALIDACJI LINKÓW YT I KODÓW QR\nData: ${new Date().toLocaleString()}\n========================================\n\n`;
            const blob = new Blob([header + window.currentFailedLogsTxt], { type: "text/plain;charset=utf-8;" });

            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `raport_walidacji_${timestamp}.txt`;
            link.click();
        });

        /* --- OBSŁUGA EKSPORTU CSV --- */
        document.getElementById("export-csv-btn").addEventListener("click", function () {
            if (savedCardsCollection.length === 0) {
                alert("Brak kart do wyeksportowania!");
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
            csvContent += "Rok;Wykonawca;Tytuł;URL\n"; // Zmieniony nagłówek zgodnie z nowym układem

            savedCardsCollection.forEach(card => {
                const row = [
                    `"${card.year.replace(/"/g, '""')}"`, // Rok pierwszy
                    `"${card.artist.replace(/"/g, '""')}"`,
                    `"${card.title.replace(/"/g, '""')}"`, // Tytuł jako trzeci
                    `"${card.rawUrl.replace(/"/g, '""')}"`
                ].join(";");
                csvContent += row + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `lista_utworow_${Date.now()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        /* --- OBSŁUGA IMPORTU CSV --- */
        const csvFileInput = document.getElementById("csv-file-input");
        document.getElementById("import-csv-trigger").addEventListener("click", function () {
            csvFileInput.click();
        });

        csvFileInput.addEventListener("change", function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                const text = e.target.result;
                const lines = text.split(/\r?\n/);
                if (lines.length < 2) return;

                let importedCount = 0;
                let hiddenGen = document.getElementById("qr-hidden-generator");

                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (line === "") continue;

                    let columns = [];
                    if (line.includes(";")) {
                        columns = line.split(";");
                    } else {
                        columns = line.split(",");
                    }

                    columns = columns.map(col => {
                        let c = col.trim();
                        if (c.startsWith('"') && c.endsWith('"')) {
                            c = c.substring(1, c.length - 1);
                        }
                        return c.replace(/""/g, '"');
                    });

                    if (columns.length >= 4) {
                        // ZAMIANA MIEJSCAMI: Rok jest pierwszy (index 0), Tytuł jest trzeci (index 2)
                        const rok = columns[0]?.trim() || "";
                        const artysta = columns[1]?.trim() || "";
                        const tytul = columns[2]?.trim() || "";
                        const url = columns[3]?.trim() || "";

                        if (url === "") continue;

                        hiddenGen.innerHTML = "";
                        const hiddenQr = new QRCode(hiddenGen, {
                            text: url,
                            width: 150,
                            height: 150,
                            colorDark: "#000000",
                            colorLight: "#ffffff",
                            correctLevel: QRCode.CorrectLevel.H
                        });

                        const canvas = hiddenGen.querySelector("canvas");
                        let qrSrc = "";
                        if (canvas) {
                            qrSrc = canvas.toDataURL("image/png");
                        }

                        const cardData = {
                            id: Date.now() + i,
                            artist: artysta,
                            year: rok,
                            title: tytul,
                            qrDataUrl: qrSrc,
                            backgroundStyle: "",
                            backgroundColor: "",
                            rawUrl: url,
                            yearFontSize: /^\d+$/.test(rok) ? "22pt" : "18pt",
                            validationStatus: "none"
                        };

                        savedCardsCollection.push(cardData);
                        importedCount++;
                    }
                }

                hiddenGen.innerHTML = "";
                updateQueueUI();
                alert(`✅ Pomyślnie zaimportowano ${importedCount} utworów z pliku CSV!`);
                csvFileInput.value = "";
            };
            reader.readAsText(file);
        });

        /* --- SZYBKI I NIEZAWODNY GENERATOR ARKUSZY PDF (AWERS + REWERS NA JEDNEJ STRONIE A4 POZIOMO) --- */
        /* --- ZMODYFIKOWANY GENERATOR PDF: 4 KARTY NA STRONIE A4 (PIONOWO) --- */
        document.getElementById("download-sheets-btn").addEventListener("click", async function () {
            if (savedCardsCollection.length === 0) {
                alert("Kolejka kart jest pusta! Dodaj utwory przed wygenerowaniem PDF.");
                return;
            }

            const { jsPDF } = window.jspdf;
            // Zmiana orientacji na pionową (Portrait)
            const doc = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a4'
            });

            const originalText = this.innerText;
            this.innerText = "⏳ Generowanie PDF...";
            this.disabled = true;

            try {
                const cardW = 60;   // Szerokość pojedynczego awersu/rewersu
                const cardH = 90;   // Wysokość karty
                const cardsPerPage = 4; // 4 karty (awers+rewers) na stronę

                // Stałe marginesy dla idealnego wyśrodkowania 4 kart w pionie
                // Całkowita szerokość zestawu = 120mm (210mm - 120mm = 90mm / 2 = 45mm marginesu bocznego)
                const startX = (210 - (cardW * 2)) / 2;
                // Całkowita wysokość 4 kart z odstępem 4mm = (4 * 90) + (3 * 4) = 372mm -> to za dużo na A4 (297mm)!
                // Aby zmieścić 4 karty, musimy ułożyć je bez pionowych odstępów (4 * 90mm = 360mm - wciąż za dużo dla 297mm).

                // POPRAWKA LOGIKI SKALOWANIA:
                // Skoro oryginalny rozmiar (120x90mm) uniemożliwia zmieszczenie 4 sztuk na wys. 297mm,
                // automatycznie skalujemy karty proporcjonalnie do rozmiaru ~48mm x 72mm (Szerokość pary = 96mm).
                const scaledW = 48;
                const scaledH = 72;
                const spacingY = 1.5; // mały odstęp pionowy między kartami

                const totalContentH = (cardsPerPage * scaledH) + ((cardsPerPage - 1) * spacingY);
                const startY = (297 - totalContentH) / 2; // Wyśrodkowanie w pionie
                const currentStartX = (210 - (scaledW * 2)) / 2; // Wyśrodkowanie w poziomie

                for (let i = 0; i < savedCardsCollection.length; i++) {
                    const card = savedCardsCollection[i];
                    const pageIndex = Math.floor(i / cardsPerPage);
                    const cardIndexOnPage = i % cardsPerPage;

                    // Jeśli zaczynamy nową stronę (i nie jest to pierwsza karta)
                    if (i > 0 && cardIndexOnPage === 0) {
                        doc.addPage(['a4', 'portrait']);
                    }

                    // Obliczenie pozycji Y dla bieżącej karty na stronie
                    const currentScaleY = startY + (cardIndexOnPage * (scaledH + spacingY));

                    // Tymczasowy element do renderingu awersu (w pełnej rozdzielczości domyślnej)
                    const tempWrapper = document.createElement("div");
                    tempWrapper.style.position = "absolute";
                    tempWrapper.style.left = "-9999px";
                    tempWrapper.style.top = "-9999px";

                    tempWrapper.innerHTML = `
                        <div class="card-print print-front" style="width: 60mm; height: 90mm;">
                            <div class="front-header">Quiz Muzyczny</div>
                            <div class="artist">${card.artist}</div>
                            <div class="title">${card.title}</div>
                            <div class="front-divider"></div>
                            <div class="year" style="font-size: ${card.yearFontSize || '18pt'};">${card.year}</div>
                        </div>
                    `;
                    factory.appendChild(tempWrapper);

                    // Renderowanie Awersu do Canvas
                    const canvasFront = await html2canvas(tempWrapper.firstElementChild, {
                        scale: 3,
                        useCORS: true,
                        allowTaint: true
                    });
                    const imgDataFront = canvasFront.toDataURL("image/jpeg", 0.95);
                    factory.removeChild(tempWrapper);

                    // 1. Rysowanie AWERSU (Lewa strona)
                    doc.addImage(imgDataFront, 'JPEG', currentStartX, currentScaleY, scaledW, scaledH);

                    // 2. Rysowanie tła REWERSU (Prawa strona)
                    const rewersX = currentStartX + scaledW;
                    doc.setFillColor(15, 23, 42);
                    doc.rect(rewersX, currentScaleY, scaledW, scaledH, 'F');

                    // Cienka złota wewnętrzna ramka rewersu (przeskalowana)
                    doc.setDrawColor(224, 169, 109);
                    doc.setLineWidth(0.2);
                    doc.rect(rewersX + 2.4, currentScaleY + 2.4, scaledW - 4.8, scaledH - 4.8, 'D');

                    // Tekst na rewersie
                    doc.setTextColor(148, 163, 184);
                    doc.setFont("Helvetica", "bold");
                    doc.setFontSize(7);
                    doc.text("ZESKANUJ UTWÓR", rewersX + (scaledW / 2), currentScaleY + 10, { align: "center" });

                    // Wstrzyknięcie kodu QR (proporcjonalnie zmniejszonego do 21mm)
                    const qrSize = 21;
                    const qrX = rewersX + ((scaledW - qrSize) / 2);
                    const qrY = currentScaleY + ((scaledH - qrSize) / 2) + 3;

                    // Złota obwódka wokół kontenera QR
                    doc.setDrawColor(224, 169, 109);
                    doc.setLineWidth(0.4);
                    doc.setFillColor(255, 255, 255);
                    doc.rect(qrX - 2, qrY - 2, qrSize + 4, qrSize + 4, 'FD');

                    doc.addImage(card.qrDataUrl, 'PNG', qrX, qrY, qrSize, qrSize);

                    // 3. Pionowa przerywana linia zgięcia na środku karty
                    doc.setDrawColor(224, 169, 109);
                    doc.setLineWidth(0.25);
                    doc.setLineDashPattern([1.5, 1.5], 0);
                    doc.line(currentStartX + scaledW, currentScaleY, currentStartX + scaledW, currentScaleY + scaledH);
                    doc.setLineDashPattern([], 0);
                }

                doc.save(`Arkusze_Premium_Cards_4szt_${Date.now()}.pdf`);

            } catch (err) {
                console.error(err);
                alert("Wystąpił błąd podczas generowania pliku PDF.");
            } finally {
                this.innerText = originalText;
                this.disabled = false;
            }
        });
    </script>
</body>
